receivers:
  otlp:
    protocols:
      grpc: {}
      http: {}

processors:
  batch: {}

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]

exporters:
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true
  logging: {}
  prometheus:
    endpoint: 0.0.0.0:8889
