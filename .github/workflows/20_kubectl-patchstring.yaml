name: Release/kubectl-patchstring
on:
  release:
    types:
      - created
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  actions: write
env:
  GITHUB_TOKEN: ${{ github.token }}
jobs:
  release:
    timeout-minutes: 10
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - platform: ubuntu-24.04
            goos: darwin
            goarch: amd64
          - platform: ubuntu-24.04
            goos: darwin
            goarch: arm64
          - platform: ubuntu-24.04
            goos: linux
            goarch: amd64
          - platform: ubuntu-24.04
            goos: linux
            goarch: arm64
          - platform: ubuntu-24.04
            goos: windows
            goarch: amd64
          - platform: ubuntu-24.04
            goos: windows
            goarch: arm64
    steps:
      - run: docker login ghcr.io -u ${GITHUB_REPOSITORY_OWNER} -p ${GITHUB_TOKEN}
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            kubectl-plugins/kubectl-patchstring/
      - run: |
          set -eo pipefail
          VERSION=$(echo ${{ github.event.release.tag_name }} | sed 's/^v//')
          EXTENSION=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXTENSION=".exe"
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o dist/kubectl-patchstring_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}${EXTENSION} main.go
          gh release upload ${{ github.event.release.tag_name }} dist/kubectl-patchstring_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}${EXTENSION}
        working-directory: kubectl-plugins/kubectl-patchstring
  rerun:
    if: failure() && github.run_attempt == 1
    needs: release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: gh run rerun --failed ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
