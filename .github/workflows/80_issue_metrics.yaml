name: Issue Metrics
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
  actions: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  report:
    if: github.repository_owner == 'kaidotio'
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - run: |
          set -eo pipefail
          first_day=$(date -d "last month" +%Y-%m-01)
          last_day=$(date -d "$first_day +1 month -1 day" +%Y-%m-%d)

          echo "last_month=$first_day..$last_day" >> "$GITHUB_ENV"
      - uses: github/issue-metrics@v3
        env:
          GH_TOKEN: ${{ github.token }}
          SEARCH_QUERY: repo:${{ github.repository }} is:"issue pr" created:${{ env.last_month }}
      - run: cat issue_metrics.md >> $GITHUB_STEP_SUMMARY
  rerun:
    if: failure() && github.run_attempt == 1
    needs: report
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: gh run rerun --failed ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
