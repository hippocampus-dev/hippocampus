name: Release/fuse-csi-driver
on:
  release:
    types:
      - created
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  id-token: write
env:
  GITHUB_TOKEN: ${{ github.token }}
jobs:
  runner:
    if: github.repository_owner == 'kaidotio'
    uses: ./.github/workflows/reusable_dynamic-runner.yaml
    with:
      labels: self-hosted,local
      fallback-runner: ubuntu-24.04
    secrets: inherit
  release:
    needs: runner
    if: ${{ !cancelled() && needs.runner.outputs.runner }}
    timeout-minutes: 10
    runs-on: ${{ fromJSON(needs.runner.outputs.runner) }}
    steps:
      - if: contains(needs.runner.outputs.runner, 'local')
        run: echo "GIT_CONFIG_GLOBAL=${{ runner.temp }}/gitconfig" >> $GITHUB_ENV
      - run: git config --global submodule.recurse false
      - if: contains(needs.runner.outputs.runner, 'local')
        run: echo "DOCKER_CONFIG=${{ runner.temp }}/.docker" >> $GITHUB_ENV
      - run: docker login ghcr.io -u "${GITHUB_REPOSITORY_OWNER}" -p "${GITHUB_TOKEN}"
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            cluster/applications/fuse-csi-driver/
      - run: |
          set -eo pipefail
          mkdir -p ${{ runner.temp }}/bin
          curl -fsSL https://github.com/goreleaser/goreleaser/releases/download/v2.8.2/goreleaser_Linux_x86_64.tar.gz | tar zx --no-same-owner -C ${{ runner.temp }}/bin goreleaser
          echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"
      - run: |
          set -eo pipefail
          goreleaser release
        working-directory: cluster/applications/fuse-csi-driver
