name: Test/redis-proxy
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - ".github/workflows/40_redis-proxy.yaml"
      - "cluster/applications/redis-proxy/**"
  #merge_group:
  #  branches:
  #    - main
  #  types:
  #    - checks_requested
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
  actions: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    if: github.repository_owner == 'kaidotio' && (github.event_name == 'workflow_dispatch' || (github.event.pull_request.draft == false && github.event.pull_request.state == 'open'))
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            cluster/applications/redis-proxy/
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: |
          set -eo pipefail
          go test ./... -race -bench=. -benchmem -trimpath
        working-directory: cluster/applications/redis-proxy
  rerun:
    if: failure() && github.run_attempt == 1
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: gh run rerun --failed ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
