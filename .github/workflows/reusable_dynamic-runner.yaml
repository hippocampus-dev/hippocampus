name: Dynamic runner
on:
  workflow_call:
    inputs:
      labels:
        required: true
        type: string
      fallback-runner:
        required: true
        type: string
    outputs:
      runner:
        value: ${{ jobs.check.outputs.runner }}
jobs:
  issue-github-token:
    uses: ./.github/workflows/reusable_issue-github-token.yaml
    with:
      profile: administration-reader
    secrets: inherit
    continue-on-error: true
  check:
    needs: issue-github-token
    if: ${{ !cancelled() }}
    timeout-minutes: 1
    runs-on: [self-hosted, local]
    environment: deployment
    outputs:
      runner: ${{ steps.check-runner.outputs.runner }}
    steps:
      - id: decrypt
        if: ${{ needs.issue-github-token.result == 'success' }}
        run: |
          set -eo pipefail
          TOKEN=$(echo "$ENCRYPTED_TOKEN" | base64 -d | gpg -dq --batch --passphrase "$GPG_PASSPHRASE")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
        env:
          ENCRYPTED_TOKEN: ${{ needs.issue-github-token.outputs.encrypted_token }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - id: check-runner
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.decrypt.outputs.token || github.token }}
          script: |
            const labels = "${{ inputs.labels }}".split(",");
            const fallback = "${{ inputs.fallback-runner }}";

            try {
              const runners = await github.paginate(github.rest.actions.listSelfHostedRunnersForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              const runner = runners.find(r => r && r.status === "online" && labels.every(label => r.labels.some(l => l.name === label)));

              const result = runner ? JSON.stringify(labels) : JSON.stringify(fallback);
              core.setOutput("runner", result);
            } catch (error) {
              core.warning(`Runner check failed, using fallback: ${error.message}`);
              core.setOutput("runner", JSON.stringify(fallback));
            }
