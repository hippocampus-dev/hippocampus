name: remotty
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/00_remotty.yaml"
      - "cluster/applications/remotty/**"
      - "!**/*.md"
  workflow_dispatch:
    inputs: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write
jobs:
  runner:
    if: github.repository_owner == 'kaidotio'
    uses: ./.github/workflows/reusable_dynamic-runner.yaml
    with:
      labels: self-hosted,local
      fallback-runner: ubuntu-24.04
    secrets: inherit
  publish:
    needs: runner
    if: ${{ !cancelled() && needs.runner.outputs.runner }}
    timeout-minutes: 10
    runs-on: ${{ fromJSON(needs.runner.outputs.runner) }}
    env:
      IMAGE: remotty
      KUSTOMIZATION: ""
    steps:
      - if: contains(needs.runner.outputs.runner, 'local')
        run: echo "GIT_CONFIG_GLOBAL=${{ runner.temp }}/gitconfig" >> $GITHUB_ENV
      - run: git config --global submodule.recurse false
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            .github/
            cluster/applications/remotty/
      - uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/.cache/docker-build/remotty
          key: ${{ runner.os }}-remotty-docker-${{ hashFiles('cluster/applications/remotty/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-remotty-docker-
      - if: contains(needs.runner.outputs.runner, 'local')
        run: echo "DOCKER_CONFIG=${{ runner.temp }}/.docker" >> $GITHUB_ENV
      - uses: ./.github/actions/setup-docker
      - run: |
          set -eo pipefail
          IMAGE_PATH="${GITHUB_REPOSITORY}/${IMAGE}"
          GHCR_IMAGE="ghcr.io/${IMAGE_PATH}"
          TAG="${GITHUB_REF##*/}"
          opt=""
          if [ -d "${{ runner.temp }}/.cache/docker-build/remotty" ]; then
            opt="--cache-from type=local,src=${{ runner.temp }}/.cache/docker-build/remotty"
          else
            opt="--cache-from type=registry,ref=${GHCR_IMAGE}:cache"
          fi
          (
            cd cluster/applications/remotty

            docker buildx build --output "type=docker,name=${GHCR_IMAGE}:${TAG},push=false" ${opt} --cache-to "type=local,mode=max,dest=${{ runner.temp }}/.cache/docker-build/remotty" .
          )
          docker push "${GHCR_IMAGE}:${TAG}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
  scan:
    if: ${{ !cancelled() && github.repository_owner == 'kaidotio' && needs.publish.result == 'success' }}
    needs: [runner, publish]
    uses: ./.github/workflows/reusable_scan-image.yaml
    with:
      image: ghcr.io/${{ github.repository }}/remotty:${{ github.ref_name }}
      runner: ${{ needs.runner.outputs.runner }}
    secrets: inherit
