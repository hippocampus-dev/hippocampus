name: Release/armyknife
on:
  release:
    types:
      - created
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
env:
  GITHUB_TOKEN: ${{ github.token }}
jobs:
  release:
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - run: git config --global submodule.recurse false
      - run: docker login ghcr.io -u "${GITHUB_REPOSITORY_OWNER}" -p "${GITHUB_TOKEN}"
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            armyknife/
            bin/
      - run: |
          set -eo pipefail
          VERSION=$(echo ${{ github.event.release.tag_name }} | sed 's/^v//')
          bash ../bin/bump.sh "${VERSION}"
          EXTENSION=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXTENSION=".exe"
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o dist/armyknife_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}${EXTENSION} main.go
          gh release upload ${{ github.event.release.tag_name }} dist/armyknife_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}${EXTENSION}
        working-directory: armyknife
