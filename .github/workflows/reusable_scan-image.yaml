name: Scan Image
on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
        description: "Full image reference (ghcr.io/owner/repo/image:tag)"
      runner:
        required: false
        type: string
        default: '"ubuntu-24.04"'
permissions:
  contents: write
  packages: read
  id-token: write
jobs:
  issue-github-token:
    uses: ./.github/workflows/reusable_issue-github-token.yaml
    with:
      profile: writer
    secrets: inherit
  scan:
    if: ${{ !cancelled() }}
    needs: issue-github-token
    timeout-minutes: 10
    runs-on: ${{ fromJSON(inputs.runner) }}
    environment: deployment
    steps:
      - if: contains(inputs.runner, 'local')
        run: echo "GIT_CONFIG_GLOBAL=${{ runner.temp }}/gitconfig" >> $GITHUB_ENV
      - run: git config --global submodule.recurse false
      - run: docker login ghcr.io -u ${{ github.repository_owner }} -p ${{ github.token }}
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ inputs.image }}
          format: json
          output: ${{ runner.temp }}/trivy-results.json
          severity: CRITICAL
          exit-code: "0"
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ inputs.image }}
          format: cyclonedx
          output: ${{ runner.temp }}/sbom.cyclonedx.json
          exit-code: "0"
      - run: echo "SBOM_NAME=sbom-$(echo '${{ inputs.image }}' | sed 's|[/:@]|-|g')" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.SBOM_NAME }}
          path: ${{ runner.temp }}/sbom.cyclonedx.json
          retention-days: 90
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            .github/scripts/submit-dependency-snapshot.sh
            .github/scripts/create-cve-issues.sh
          sparse-checkout-cone-mode: false
      - run: GH_TOKEN="${{ github.token }}" bash .github/scripts/submit-dependency-snapshot.sh "${{ runner.temp }}/sbom.cyclonedx.json"
      - run: |
          set -eo pipefail

          VULNERABILITIES=$(jq '[.Results // [] | .[] | .Vulnerabilities // [] | length] | add // 0' "${{ runner.temp }}/trivy-results.json")
          if [ "$VULNERABILITIES" -eq 0 ]; then
            exit 0
          fi

          if [ -z "$ENCRYPTED_TOKEN" ]; then
            echo "::warning::Skipping CVE issue creation (GitHub App token unavailable)"
            exit 0
          fi

          TOKEN=$(echo "$ENCRYPTED_TOKEN" | base64 -d | gpg -dq --batch --passphrase "$GPG_PASSPHRASE")
          echo "::add-mask::$TOKEN"
          export GH_TOKEN="$TOKEN"

          bash .github/scripts/create-cve-issues.sh "${{ runner.temp }}/trivy-results.json"
        env:
          ENCRYPTED_TOKEN: ${{ needs.issue-github-token.outputs.encrypted_token }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
