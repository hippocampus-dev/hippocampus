apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: spotify-mcp-server
spec:
  selector:
    istio: ingressgateway
  servers:
    - hosts:
        - spotify-mcp-server.minikube.127.0.0.1.nip.io
        - spotify-mcp-server.kaidotio.dev
        - spotify-mcp-server-public.kaidotio.dev
      port:
        number: 80
        name: http
        protocol: HTTP
