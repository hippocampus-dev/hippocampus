- authorization_policy.yaml
- destination_rule.yaml
- envoy_filter.yaml
- gateway.yaml
- namespace.yaml
- network_policy.yaml
- peer_authentication.yaml
- request_authentication.yaml
- service_entry.yaml
- sidecar.yaml
