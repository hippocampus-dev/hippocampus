apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: oauth-bridge
spec:
  selector:
    istio: ingressgateway
  servers:
    - hosts:
        - hippocampus-dev-spotify-oauth-bridge.minikube.127.0.0.1.nip.io
        - hippocampus-dev-spotify-oauth-bridge.kaidotio.dev
        - hippocampus-dev-spotify-oauth-bridge-public.kaidotio.dev
      port:
        number: 80
        name: http
        protocol: HTTP
