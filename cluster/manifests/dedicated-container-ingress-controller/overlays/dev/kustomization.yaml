apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dedicated-container-ingress-controller

resources:
  - ../../base
  - gateway.yaml
  - namespace.yaml
  - network_policy.yaml
  - peer_authentication.yaml
  - sidecar.yaml
  - telemetry.yaml
  - virtual_service.yaml
  - redis

patches:
  - path: patches/deployment.yaml
  - path: patches/pod_disruption_budget.yaml
  - path: patches/service.yaml
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --redis-address=dedicated-container-ingress-controller-redis-haproxy-writer.dedicated-container-ingress-controller.svc.cluster.local:6379
    target:
      group: apps
      version: v1
      kind: Deployment
      name: dedicated-container-ingress-controller

generators:
  - secrets_from_vault.yaml
