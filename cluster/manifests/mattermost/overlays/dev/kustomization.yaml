apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mattermost

resources:
  - ../../base
  - namespace.yaml
  - network_policy.yaml
  - peer_authentication.yaml
  - sidecar.yaml
  - telemetry.yaml
  - gateway.yaml
  - virtual_service.yaml
  - service.yaml
  - vitess_cluster.yaml

patches:
  - path: patches/pod_disruption_budget.yaml
  - path: patches/service.yaml
  - path: patches/stateful_set.yaml

configMapGenerator:
  - name: mattermost-config
    files:
      - files/config.json
    options:
      immutable: true
  - name: mattermost-proxy-config
    files:
      - files/nginx.conf.tmpl
    options:
      immutable: true

secretGenerator:
  - name: mattermost
    files:
      - files/users.json
      - files/init_db.sql
    options:
      immutable: true

configurations:
  - kustomizeconfig.yaml
