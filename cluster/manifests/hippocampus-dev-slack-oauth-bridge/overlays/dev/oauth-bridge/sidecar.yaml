apiVersion: networking.istio.io/v1
kind: Sidecar
metadata:
  name: oauth-bridge
spec:
  workloadSelector:
    labels:
      app.kubernetes.io/component: oauth-bridge
  outboundTrafficPolicy:
    mode: REGISTRY_ONLY
  egress:
    - captureMode: DEFAULT
      hosts:
        - ./slack.com
        - ./hippocampus-dev-slack-redis-haproxy-writer.hippocampus-dev-slack-oauth-bridge.svc.cluster.local
        - istio-system/istiod.istio-system.svc.cluster.local
        - otel/otel-agent.otel.svc.cluster.local
        - pyroscope/pyroscope-distributor.pyroscope.svc.cluster.local
