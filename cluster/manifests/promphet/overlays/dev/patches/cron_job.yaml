apiVersion: batch/v1
kind: CronJob
metadata:
  name: promphet
spec:
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            sidecar.istio.io/inject: "true"
          annotations:
            sidecar.istio.io/proxyCPULimit: 1000m
            sidecar.istio.io/proxyMemoryLimit: 1Gi
            sidecar.istio.io/proxyCPU: 30m
            sidecar.istio.io/proxyMemory: 64Mi
        spec:
          dnsConfig:
            options:
              - name: ndots
                value: "1"
          containers:
            - name: promphet
              env:
                - name: PROMETHEUS_HOST
                  value: http://prometheus.prometheus.svc.cluster.local:9090
                - name: PUSHGATEWAY_HOST
                  value: http://pushgateway.pushgateway.svc.cluster.local:9091
