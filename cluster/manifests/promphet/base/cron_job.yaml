apiVersion: batch/v1
kind: CronJob
metadata:
  name: promphet
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      completions: 1
      parallelism: 1
      completionMode: Indexed
      backoffLimitPerIndex: 6
      maxFailedIndexes: 1
      podReplacementPolicy: Failed
      podFailurePolicy:
        rules:
          - action: Ignore
            onPodConditions:
              - type: DisruptionTarget
                status: "True"
      template:
        metadata:
          labels:
            app.kubernetes.io/name: promphet
            app.kubernetes.io/component: ""
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: promphet
              securityContext:
                privileged: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsUser: 65532
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              image: ghcr.io/hippocampus-dev/hippocampus/promphet
              imagePullPolicy: IfNotPresent
              volumeMounts:
                - name: config
                  mountPath: /etc/promphet
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: home
                  mountPath: /home/nonroot
          volumes:
            - name: config
              configMap:
                name: promphet
            - name: tmp
              emptyDir:
                medium: Memory
            - name: home
              emptyDir:
                medium: Memory
