apiVersion: networking.istio.io/v1
kind: Sidecar
metadata:
  name: varnish
spec:
  workloadSelector:
    labels:
      app.kubernetes.io/component: varnish
  outboundTrafficPolicy:
    mode: REGISTRY_ONLY
  egress:
    - captureMode: DEFAULT
      hosts:
        - ./api.openai.com
        - istio-system/istiod.istio-system.svc.cluster.local
        - otel/otel-agent.otel.svc.cluster.local
