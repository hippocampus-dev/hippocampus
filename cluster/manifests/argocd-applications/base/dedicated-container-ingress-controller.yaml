apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dedicated-container-ingress-controller
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
    argocd.argoproj.io/manifest-generate-paths: "/cluster/applications/dedicated-container-ingress-controller;/cluster/manifests/dedicated-container-ingress-controller;/cluster/manifests/utilities/redis"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: notifications
    notifications.argoproj.io/subscribe.on-sync-status-unknown.slack: notifications
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:hippocampus-dev/hippocampus
    targetRevision: main
    path: cluster/manifests/dedicated-container-ingress-controller/overlays/dev
    kustomize:
      version: custom
      commonAnnotationsEnvsubst: true
      commonAnnotations:
        repository: ${ARGOCD_APP_SOURCE_REPO_URL}
  destination:
    server: https://kubernetes.default.svc
    namespace: dedicated-container-ingress-controller
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.spec.containers[].env[]?.valueFrom?.resourceFieldRef?.divisor?
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .spec.template.spec.containers[].env[]?.valueFrom?.resourceFieldRef?.divisor?
        - .spec.updateStrategy.rollingUpdate.partition
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind
        - .spec.volumeClaimTemplates[].spec.volumeMode
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Validate=true
      - CreateNamespace=false
      - ServerSideApply=true
