apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dedicated-remotty
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
    argocd.argoproj.io/manifest-generate-paths: "/cluster/manifests/dedicated-remotty"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: notifications
    notifications.argoproj.io/subscribe.on-sync-status-unknown.slack: notifications
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:hippocampus-dev/hippocampus
    targetRevision: main
    path: cluster/manifests/dedicated-remotty/overlays/dev
    kustomize:
      version: custom
      commonAnnotationsEnvsubst: true
      commonAnnotations:
        repository: ${ARGOCD_APP_SOURCE_REPO_URL}
  destination:
    server: https://kubernetes.default.svc
    namespace: dedicated-remotty
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Validate=true
      - CreateNamespace=false
      - ServerSideApply=true
