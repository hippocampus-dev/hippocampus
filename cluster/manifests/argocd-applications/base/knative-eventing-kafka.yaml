apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: knative-eventing-kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-48" # knative-eventing + 1
    argocd.argoproj.io/manifest-generate-paths: "/cluster/manifests/knative-eventing-kafka;/cluster/applications/cloudevents-logger"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: notifications
    notifications.argoproj.io/subscribe.on-sync-status-unknown.slack: notifications
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:hippocampus-dev/hippocampus
    targetRevision: main
    path: cluster/manifests/knative-eventing-kafka/overlays/dev
    kustomize:
      version: custom
      commonAnnotationsEnvsubst: true
      commonAnnotations:
        repository: ${ARGOCD_APP_SOURCE_REPO_URL}
        # revision annotation is injected by https://github.com/hippocampus-dev/hippocampus/blob/main/cluster/manifests/argocd/overlays/dev/patches/deployment.yaml to support monorepo
        #revision: ${ARGOCD_APP_REVISION}
  destination:
    server: https://kubernetes.default.svc
    namespace: knative-eventing
  ignoreDifferences:
    - group: serving.knative.dev
      kind: Service
      jqPathExpressions:
        - .spec.template.spec.containers[].readinessProbe
        - .spec.traffic
        - .spec.template.spec.containers[].env[].valueFrom.resourceFieldRef.divisor
    - group: messaging.knative.dev
      kind: KafkaChannel
      jqPathExpressions:
        - .metadata.annotations["alerthandler.kaidotio.github.io/restartedAt"]
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Validate=true
      - CreateNamespace=false
