apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loganomaly
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/manifest-generate-paths: "/cluster/manifests/loganomaly;/cluster/applications/loganomaly;/cluster/manifests/utilities/redis"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: notifications
    notifications.argoproj.io/subscribe.on-sync-status-unknown.slack: notifications
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:hippocampus-dev/hippocampus
    targetRevision: main
    path: cluster/manifests/loganomaly/overlays/dev
    kustomize:
      version: custom
      commonAnnotationsEnvsubst: true
      commonAnnotations:
        repository: ${ARGOCD_APP_SOURCE_REPO_URL}
  destination:
    server: https://kubernetes.default.svc
    namespace: loganomaly
  ignoreDifferences:
    - group: serving.knative.dev
      kind: Service
      jqPathExpressions:
        - .spec.template.spec.containers[].readinessProbe
        - .spec.traffic
        - .spec.template.spec.containers[].env[].valueFrom.resourceFieldRef.divisor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Validate=true
      - CreateNamespace=false
