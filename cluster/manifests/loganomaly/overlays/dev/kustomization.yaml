apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: loganomaly

resources:
  - ../../base
  - namespace.yaml
  - network_policy.yaml
  - peer_authentication.yaml
  - sidecar.yaml
  - telemetry.yaml
  - kafka_source.yaml
  - sequence.yaml
  - cloudevents-alertmanager
  - loganomaly-adapter
  - loganomaly-deduplicator
  - redis

patches:
  - path: patches/deployment.yaml
  - path: patches/pod_disruption_budget.yaml
