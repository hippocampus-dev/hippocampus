apiVersion: networking.istio.io/v1
kind: Sidecar
metadata:
  name: loganomaly-deduplicator
spec:
  workloadSelector:
    labels:
      app.kubernetes.io/name: loganomaly-deduplicator
  outboundTrafficPolicy:
    mode: REGISTRY_ONLY
  egress:
    - captureMode: DEFAULT
      hosts:
        - ./loganomaly-redis-haproxy-writer.loganomaly.svc.cluster.local
        - istio-system/istiod.istio-system.svc.cluster.local
        - otel/otel-agent.otel.svc.cluster.local
