apiVersion: flows.knative.dev/v1
kind: Sequence
metadata:
  name: loganomaly
spec:
  channelTemplate:
    apiVersion: messaging.knative.dev/v1beta1
    kind: KafkaChannel
    spec:
      numPartitions: 1
      replicationFactor: 1
  steps:
    - ref:
        apiVersion: serving.knative.dev/v1
        kind: Service
        name: loganomaly-deduplicator
    - ref:
        apiVersion: serving.knative.dev/v1
        kind: Service
        name: loganomaly-adapter
    - ref:
        apiVersion: serving.knative.dev/v1
        kind: Service
        name: cloudevents-alertmanager
  reply:
    ref:
      apiVersion: eventing.knative.dev/v1alpha1
      kind: KafkaSink
      name: dead-letter
      namespace: knative-eventing
