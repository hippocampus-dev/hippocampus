apiVersion: networking.istio.io/v1
kind: Sidecar
metadata:
  name: cloudevents-alertmanager
spec:
  workloadSelector:
    labels:
      app.kubernetes.io/name: cloudevents-alertmanager
  outboundTrafficPolicy:
    mode: REGISTRY_ONLY
  egress:
    - captureMode: DEFAULT
      hosts:
        - mimir/mimir-alertmanager.mimir.svc.cluster.local
        - istio-system/istiod.istio-system.svc.cluster.local
        - otel/otel-agent.otel.svc.cluster.local
