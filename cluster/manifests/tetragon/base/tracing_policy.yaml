# Block kernel module loading from containers.
# Containers should never load kernel modules; this is almost always
# an indicator of container escape or rootkit installation.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-kernel-modules
spec:
  kprobes:
    - call: security_kernel_module_request
      syscall: false
      return: true
      args:
        - index: 0
          type: string
      returnArg:
        index: 0
        type: int
      selectors:
        - matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values:
                - host_ns
          matchActions:
            - action: Override
              argError: -1
            - action: Sigkill
    - call: security_kernel_read_file
      syscall: false
      return: true
      args:
        - index: 0
          type: file
        - index: 1
          type: int
      returnArg:
        index: 0
        type: int
      selectors:
        - matchArgs:
            - index: 1
              operator: Equal
              values:
                - "2"
          matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values:
                - host_ns
          matchActions:
            - action: Override
              argError: -1
            - action: Sigkill
