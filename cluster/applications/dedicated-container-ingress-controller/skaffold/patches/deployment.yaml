apiVersion: apps/v1
kind: Deployment
metadata:
  name: dedicated-container-ingress-controller
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1
  template:
    spec:
      containers:
        - name: dedicated-container-ingress-controller
          image: ghcr.io/hippocampus-dev/hippocampus/skaffold
          args:
            - --redis-address=skaffold-redis-0.skaffold-redis:6379
          env:
            - name: COOKIE_SECRET_KEY
              value: skaffold-secret-key-for-development
            - name: VARIANT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['variant']
          volumeMounts:
            # delve uses /home/nonroot/.config for storing delve configuration
            - name: tmp
              mountPath: /home/nonroot/.config
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
