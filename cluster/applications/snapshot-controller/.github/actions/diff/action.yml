name: Diff
inputs:
  baseline:
    required: true
    description: "Baseline path"
  target:
    required: true
    description: "Target path"
outputs:
  diffPath:
    description: "Diff path"
  diffRatio:
    description: "Difference ratio"
runs:
  using: docker
  image: Dockerfile
  args:
    - ${{ inputs.baseline }}
    - ${{ inputs.target }}
