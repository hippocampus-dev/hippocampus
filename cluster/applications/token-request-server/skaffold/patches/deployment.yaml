apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-request-server
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1
  template:
    spec:
      containers:
        - name: token-request-server
          image: ghcr.io/hippocampus-dev/hippocampus/skaffold
          env:
            - name: OTEL_TRACES_SAMPLER
              value: always_off
          volumeMounts:
            # delve uses /home/nonroot/.config for storing delve configuration
            - name: tmp
              mountPath: /home/nonroot/.config
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
