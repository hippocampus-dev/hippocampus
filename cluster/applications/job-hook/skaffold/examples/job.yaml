apiVersion: batch/v1
kind: Job
metadata:
  name: my-job
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: my-container
          image: busybox
          command:
            - echo
            - $(JOB_CREATION_TIMESTAMP)
          env:
            - name: JOB_CREATION_TIMESTAMP
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['skaffold.job-hook.kaidotio.github.io/job-creation-timestamp']
