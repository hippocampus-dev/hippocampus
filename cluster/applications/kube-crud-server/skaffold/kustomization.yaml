apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: skaffold-

labels:
  - includeSelectors: true
    pairs:
      variant: skaffold

namespace: skaffold-kube-crud-server

resources:
  - ../manifests
  - namespace.yaml

configMapGenerator:
  - files:
      - files/nginx.conf
    name: cors-proxy
    options:
      immutable: true

images:
  - digest: sha256:c20cc0fb2627491f6d0c6eb08eb3a0f892c26effd559607742128b65f11436e1
    name: nginx
    newName: ghcr.io/hippocampus-dev/hippocampus/mirror/nginx

patches:
  - path: patches/deployment.yaml
  - path: patches/service.yaml
